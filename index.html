<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>コルトン丘テロワールマップ — WineMap プロト</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header">
    <h1>コルトン丘テロワールマップ</h1>
    <p class="subtitle">WineMap プロト（Phase 5 S3: レイヤ切替・フィルタ）</p>
  </div>
  <div id="map"></div>

  <div id="view-control">
    <div class="vc-title">表示モード</div>
    <label><input type="radio" name="view" value="hierarchy" checked> 階層</label>
    <label><input type="radio" name="view" value="elevation"> 標高</label>
    <label><input type="radio" name="view" value="aspect"> 方位</label>
  </div>

  <div id="legend">
    <div class="legend-title" id="legend-title">階層</div>
    <div id="legend-body"></div>
    <div class="legend-hint" id="legend-hint"></div>
  </div>
  <script src="js/map.js"></script>
</body>
</html>
