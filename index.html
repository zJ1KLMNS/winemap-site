<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WineMap — 仏ワイン AOC テロワールマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="header">
    <div class="header-row">
      <h1>WineMap</h1>
      <span class="subtitle">仏ワイン AOC テロワールマップ（Phase 2 全仏、Champagne 除く）</span>
    </div>
    <div id="search-box">
      <input type="search" id="search-input" placeholder="AOC 名・climat 名で検索（例: Margaux, Chambertin, Châteauneuf）" autocomplete="off">
      <ul id="search-results"></ul>
    </div>
  </div>
  <div id="map"></div>

  <div id="legend">
    <div class="legend-title" id="legend-title">階層（クリックで表示切替）</div>
    <div id="legend-body"></div>
    <div class="legend-hint" id="legend-hint"></div>
  </div>

  <div id="loading-spinner" class="visible">
    <div class="spinner-ring"></div>
    <div class="spinner-text">データを読み込み中…</div>
  </div>
  <script src="js/map.js"></script>
</body>
</html>
